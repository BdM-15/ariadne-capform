<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
              mono: ["JetBrains Mono", "ui-monospace", "monospace"],
            },
            colors: {
              ink: {
                950: "#05070d",
                900: "#0a0e1a",
                850: "#0f1422",
                800: "#141a2b",
                700: "#1c2338",
                600: "#283151",
              },
              neon: {
                cyan: "#00f0ff",
                magenta: "#ff2bd6",
                lime: "#00ff9c",
                amber: "#ffb020",
                red: "#ff3b6b",
              },
              edge: { DEFAULT: "#1f2a44", strong: "#2c3a5e" },
            },
            boxShadow: {
              glow: "0 0 18px rgba(0,240,255,0.25), 0 0 2px rgba(0,240,255,0.5) inset",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/static/styles/theseus.css" />
    <link rel="stylesheet" href="/static/styles/thread.css" />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  </head>
  <body class="font-sans antialiased scanline min-h-screen flex flex-col">
    <header class="h-14 shrink-0 topbar-vibrant flex items-center px-5 gap-5 sticky top-0 z-40">
      <div class="flex items-center gap-2.5 min-w-[240px]">
        <div class="brand-tile w-10 h-10 rounded-xl flex items-center justify-center" title="{{ app_name }}">
          <svg viewBox="0 0 40 40" class="w-10 h-10 brand-labyrinth" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="lab-wall" x1="0" y1="0" x2="40" y2="40">
                <stop offset="0%" stop-color="#00f0ff" />
                <stop offset="55%" stop-color="#a855f7" />
                <stop offset="100%" stop-color="#ff2bd6" />
              </linearGradient>
            </defs>
            <g stroke="url(#lab-wall)" stroke-width="1.6" fill="none">
              <path d="M7 7 H33 V33 H22" />
              <path d="M18 33 H7 V7" />
              <path d="M10 10 H30 V30 H22" />
              <path d="M18 30 H10 V10" />
            </g>
            <circle cx="20" cy="20" r="3.5" fill="#00f0ff" opacity="0.9" />
          </svg>
        </div>
        <div class="leading-tight">
          <div class="text-sm font-semibold tracking-tight">
            {{ app_name }}<span class="neon-text">.</span>
          </div>
          <div class="text-[11px] font-mono uppercase tracking-wider text-slate-500">
            {% block subtitle %}Capture command center{% endblock %}
          </div>
        </div>
      </div>
      <nav class="flex items-center gap-2 ml-auto">
        <a href="/" class="topbar-pill {% if active_nav == 'pulse' %}text-neon-cyan{% endif %}">
          Portfolio Pulse
        </a>
      </nav>
    </header>

    <main class="flex-1 w-full max-w-6xl mx-auto px-6 py-8">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
