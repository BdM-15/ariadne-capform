<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
              mono: ["JetBrains Mono", "ui-monospace", "monospace"],
            },
            colors: {
              ink: {
                950: "#05070d",
                900: "#0a0e1a",
                850: "#0f1422",
                800: "#141a2b",
                700: "#1c2338",
                600: "#283151",
              },
              neon: {
                cyan: "#00f0ff",
                magenta: "#ff2bd6",
                lime: "#00ff9c",
                amber: "#ffb020",
                red: "#ff3b6b",
              },
              edge: { DEFAULT: "#1f2a44", strong: "#2c3a5e" },
            },
            boxShadow: {
              glow: "0 0 18px rgba(0,240,255,0.25), 0 0 2px rgba(0,240,255,0.5) inset",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/static/styles/theseus.css" />
    <link rel="stylesheet" href="/static/styles/thread.css" />
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  </head>
  <body class="font-sans antialiased scanline min-h-screen flex flex-col">
    {% include "partials/app_topbar.html" %}

    <div class="app-shell flex flex-1 min-h-0 h-[calc(100vh-3.5rem)] overflow-hidden">
      {% include "partials/app_sidebar.html" %}

      <div class="app-main flex flex-col flex-1 min-w-0 min-h-0">
        {% block page_header %}{% endblock %}
        <main class="app-canvas panel-canvas flex-1 overflow-y-auto min-h-0">
          <div class="app-canvas-inner page-content px-8 py-8 w-full min-w-0">
            {% block content %}{% endblock %}
          </div>
        </main>
      </div>
    </div>
    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
    <script>
      function initLucide() {
        if (window.lucide) window.lucide.createIcons();
      }
      function openGuideDialog(id) {
        const el = document.getElementById(id);
        if (el && typeof el.showModal === "function") {
          el.showModal();
          initLucide();
        }
      }
      function closeGuideDialog(id) {
        const el = document.getElementById(id);
        if (el && typeof el.close === "function") el.close();
      }
      function initGuideDialogs() {
        document.querySelectorAll("dialog.guide-modal").forEach((dialog) => {
          if (dialog.dataset.guideBound) return;
          dialog.dataset.guideBound = "1";
          dialog.addEventListener("click", (e) => {
            if (e.target === dialog) dialog.close();
          });
        });
      }
      document.addEventListener("DOMContentLoaded", () => {
        initLucide();
        initGuideDialogs();
      });
      document.body.addEventListener("htmx:afterSwap", () => {
        initLucide();
        initGuideDialogs();
      });
    </script>
  </body>
</html>
