{% extends "base.html" %}
{% block title %}{{ page_title }} — {{ app_name }}{% endblock %}
{% block page_header %}
<header class="page-nav-bar glass-section-bar h-12 shrink-0 flex items-center px-6 justify-between gap-4">
  <div class="flex items-center gap-3 min-w-0 flex-wrap">
    <h1 class="text-base font-semibold tracking-tight h1-gradient shrink-0">{{ page_title }}</h1>
    <span class="pill border border-neon-cyan/40 text-neon-cyan text-[10px] font-mono uppercase">{{ product_lane }}</span>
    <span class="text-[11px] font-mono text-slate-500 truncate">{{ page_description }}</span>
  </div>
  <span class="pill border border-edge text-slate-500 text-[10px] font-mono shrink-0">Phase {{ next_phase }}</span>
</header>
{% endblock %}
{% block content %}
<section class="card card-accent accent-cyan p-6">
  <h2 class="font-semibold text-sm mb-2 text-neon-cyan">Shell stub</h2>
  <p class="text-sm text-slate-400">{{ stub_message }}</p>
</section>
{% endblock %}
