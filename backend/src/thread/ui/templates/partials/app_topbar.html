<header class="h-14 shrink-0 topbar-vibrant flex items-center px-5 gap-5 sticky top-0 z-40 scanlines">
  <a href="/" class="flex items-center gap-2.5 min-w-[220px] no-underline" style="color: inherit">
    <div
      class="brand-tile w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
      title="{{ app_name }} — capture command center"
    >
      {% include "partials/brand_mark.html" %}
    </div>
    <div class="leading-tight min-w-0">
      <div class="font-semibold text-sm tracking-wide truncate">
        <span class="neon-text">{{ app_name }}</span>
      </div>
      <div class="text-[10px] uppercase font-mono text-slate-500 tracking-[0.2em] truncate">
        Command center
      </div>
    </div>
  </a>

  <div class="flex-1 max-w-2xl mx-auto hidden md:block">
    <div
      class="w-full flex items-center gap-3 rounded-xl px-3.5 py-2 text-sm text-slate-500 topbar-pill cursor-default"
      title="Command palette — Phase 13"
    >
      <span class="text-neon-cyan font-mono text-xs">⌕</span>
      <span class="flex-1 text-left">Jump to pursuit, insight, or review…</span>
      <span class="text-[10px] font-mono text-neon-cyan border border-neon-cyan/40 px-1.5 py-0.5 rounded bg-neon-cyan/5">
        soon
      </span>
    </div>
  </div>

  <div class="flex items-center gap-2 ml-auto">
    <div class="topbar-pill">
      <span class="w-2 h-2 rounded-full bg-neon-lime status-pulse"></span>
      <div class="leading-tight">
        <div class="text-[10px] uppercase font-mono tracking-wider text-neon-lime">API ONLINE</div>
        <div class="text-[10px] font-mono text-slate-500">HTMX shell</div>
      </div>
    </div>
    <a class="topbar-icon-btn" href="/docs" target="_blank" title="OpenAPI docs">{}</a>
  </div>
</header>
