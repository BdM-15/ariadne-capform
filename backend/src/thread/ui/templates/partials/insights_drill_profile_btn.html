{# ponytail: data-insights-drill + postInsightsSlice — one POST path with facet FormData #}
{# entity_kind: competitor|agency; entity_scope: recipient|agency|sub_agency|office; value: entity label #}
{% set drill_lens = 'competitor' if entity_kind == 'competitor' else 'agency' %}
<button
  type="button"
  class="insights-drill-chip btn btn-ghost btn-compact text-[10px] {{ extra_class or '' }}"
  data-insights-drill="1"
  data-lens="{{ drill_lens }}"
  data-entity-kind="{{ entity_kind }}"
  data-entity-scope="{{ entity_scope }}"
  data-entity-value="{{ value|e }}"
>{{ label or 'Profile →' }}</button>
