<div id="field-{{ field.field_key }}" class="card card-accent accent-cyan overflow-hidden packet-field-card">
  <div class="px-5 py-3 border-b border-edge">
    <div class="flex flex-wrap items-start justify-between gap-2">
      <div class="min-w-0">
        <div class="text-sm font-semibold text-slate-200">{{ field.label }}</div>
        {% if field.question %}
        <p class="text-[11px] text-slate-400 mt-1 leading-relaxed">{{ field.question }}</p>
        {% endif %}
      </div>
      <span class="pill border border-neon-cyan/30 text-neon-cyan text-[9px] font-mono uppercase shrink-0">
        {{ field.route_kind|replace('_', ' ') }}
      </span>
    </div>
    <div class="text-[10px] font-mono text-slate-600 mt-1">{{ field.field_key }}</div>
  </div>
  <div class="p-5">
    <form
      hx-post="/opportunities/{{ opp_id }}/packet/{{ field.field_key }}"
      hx-target="#field-{{ field.field_key }}"
      hx-swap="outerHTML"
    >
      <textarea class="thread-textarea w-full" name="value" placeholder="Answer or draft — submits as candidate">{{ field.value or '' }}</textarea>
      <div class="mt-3 flex items-center gap-2 text-[11px] font-mono flex-wrap">
        <span class="pill text-slate-500">{{ field.status }}</span>
        <span class="pill border border-neon-cyan/40 text-neon-cyan">{{ field.trust_level }}</span>
        <button type="submit" class="btn btn-primary ml-auto">Submit for review</button>
      </div>
    </form>
  </div>
</div>
