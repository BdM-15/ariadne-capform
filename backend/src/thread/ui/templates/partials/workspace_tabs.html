<nav class="page-tabs workspace-tabs" id="workspace-tabs" aria-label="Workspace">
  {% for key, label in tabs %}
  <button
    type="button"
    class="page-tab {% if active_tab == key %}page-tab-active{% endif %}"
    hx-get="/opportunities/{{ opp_id }}/panel?tab={{ key }}"
    hx-target="#workspace-panel"
    hx-swap="innerHTML"
  >
    {{ label }}
  </button>
  {% endfor %}
</nav>
