{% extends "base.html" %}
{% block title %}Portfolio Pulse — {{ app_name }}{% endblock %}
{% block page_header %}
<header class="page-nav-bar glass-section-bar h-12 shrink-0 flex items-center px-6 justify-between gap-4">
  <div class="flex items-center gap-3 min-w-0">
    <h1 class="text-base font-semibold tracking-tight h1-gradient shrink-0">Portfolio Pulse</h1>
    <span class="text-[11px] font-mono text-slate-500 truncate">Identify · morning briefing</span>
  </div>
  <button
    type="button"
    class="btn btn-ghost text-xs shrink-0"
    hx-get="/partials/pulse"
    hx-target="#pulse-body"
    hx-swap="outerHTML"
  >
    ↻ Refresh
  </button>
</header>
{% endblock %}
{% block content %}
{% include "partials/pulse_body.html" %}
{% endblock %}
